services:
  - type: web
    name: hv-deep-research-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        value: sqlite:///./hv_analysis.db
      - key: REPORTS_OUTPUT_DIR
        value: app/outputs/reports
      - key: BACKEND_CORS_ORIGINS
        value: https://hv-deep-research-web.onrender.com,https://silly-cactus-009ef8.netlify.app,http://localhost:5173,http://127.0.0.1:5173
      - key: LLM_PROVIDER
        value: mock

  - type: web
    name: hv-deep-research-web
    runtime: static
    plan: free
    rootDir: Design AI Research Dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://hv-deep-research-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
